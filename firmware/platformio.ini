; Somfy Roller Blind BLE -> HA — firmware build config
; Structural reference: the ESP32 Smart Shutter Hub's firmware framework (WiFiManager +
; ESPAsyncWebServer + LittleFS SPA + custom OTA + PubSubClient) — see
; docs/decisions/0001-framework-reuse.md.
;
; v0.1.0 scaffold (Phase S): on-device WiFi setup (WiFiManager AP + captive portal, creds in
; NVS) + mDNS + AsyncWebServer + custom dual-target OTA + LittleFS web UI shell + MQTT client
; scaffold. Motors/SomfyBle exist as stub modules — real BLE bring-up is Phase 1.
; v0.1.2: Apple HomeKit bridge (HomeSpan) — carried over from the Shutter Hub, including its
; vendored HomeSpan patch (patches/) — see docs/decisions/0005-apple-homekit-homespan.md.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32
framework = arduino
board     = esp32dev

monitor_speed  = 115200
upload_speed   = 921600
board_build.filesystem = littlefs   ; the web UI lives in data/ (build/upload the FS image)
; HomeSpan + NimBLE + WiFiManager + ESPAsyncWebServer + PubSubClient together don't fit in the
; default 1.28 MB OTA app slot (confirmed: v0.1.2 overflowed it at 103.2%). min_spiffs.csv trades
; filesystem space we don't need (our web UI is ~60 KB) for ~1.9 MB per OTA app slot instead —
; see docs/decisions/0002-ble-stack-nimble.md's flash-budget risk note, now realised.
board_build.partitions = min_spiffs.csv

; Vendored library patches applied before each build (survives .pio/libdeps reinstall).
; Currently fixes HomeSpan 1.9.1's newlib-nano "%m" sscanf hang — see patches/README.md.
extra_scripts = pre:patches/apply_patches.py

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
    knolleary/PubSubClient @ ^2.8       ; MQTT (blocking client; the web server is async
                                        ; on its own task, so UI stays responsive)
    h2zero/NimBLE-Arduino @ ^1.4         ; BLE central (connect-on-demand) — see
                                        ; docs/decisions/0002-ble-stack-nimble.md
    homespan/HomeSpan @ ~1.9.1           ; Apple HomeKit bridge — native HAP, no hub. Pinned to
                                        ; 1.9.x: the last line supporting arduino-esp32 core 2.0.9
                                        ; (HomeSpan 2.x requires core >= 3.3.0). See ADR 0005.
    ; OTA is our own custom page (Update.h from the core) — firmware + LittleFS,
    ; independent or together, with a version display and last-flash record.

build_flags =
    -D FW_VERSION=\"0.1.2\"
    -D MQTT_MAX_PACKET_SIZE=1024        ; HA discovery payloads exceed PubSubClient's 256B default
