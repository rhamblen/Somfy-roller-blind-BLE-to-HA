; Somfy Roller Blind BLE -> HA — firmware build config
; Structural reference: the ESP32 Smart Shutter Hub's firmware framework (WiFiManager +
; ESPAsyncWebServer + LittleFS SPA + custom OTA + PubSubClient) — see
; docs/decisions/0001-framework-reuse.md.
;
; v0.1.0 scaffold (Phase S): on-device WiFi setup (WiFiManager AP + captive portal, creds in
; NVS) + mDNS + AsyncWebServer + custom dual-target OTA + LittleFS web UI shell + MQTT client
; scaffold. Motors/SomfyBle exist as stub modules — real BLE bring-up is Phase 1.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32
framework = arduino
board     = esp32dev

monitor_speed  = 115200
upload_speed   = 921600
board_build.filesystem = littlefs   ; the web UI lives in data/ (build/upload the FS image)

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
    knolleary/PubSubClient @ ^2.8       ; MQTT (blocking client; the web server is async
                                        ; on its own task, so UI stays responsive)
    h2zero/NimBLE-Arduino @ ^1.4         ; BLE central (connect-on-demand) — see
                                        ; docs/decisions/0002-ble-stack-nimble.md
    ; OTA is our own custom page (Update.h from the core) — firmware + LittleFS,
    ; independent or together, with a version display and last-flash record.

build_flags =
    -D FW_VERSION=\"0.1.0\"
    -D MQTT_MAX_PACKET_SIZE=1024        ; HA discovery payloads exceed PubSubClient's 256B default
